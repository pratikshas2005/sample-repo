<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Light Mode</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      transition: 0.3s;
      background-color: #ffffff;
      color: #000000;
      text-align: center;
    }

    .dark-mode {
      background-color: #121212;
      color: #ffffff;
    }

    .container {
      margin-top: 100px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #333;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Dark / Light Mode 🌗</h1>
    <p>Click the button to switch theme</p>
    <button onclick="toggleMode()">Toggle Mode</button>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

</body>
</html>
