<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini Project</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #333;
            color: white;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to My Project 🚀</h1>
        <p>Click the button to see magic</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            document.getElementById("message").innerText = "Hello! You clicked the button 🎉";
        }
    </script>


</body>
</html>
